<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Array .from() and .of()</title>
</head>
<body>
  <div class="people">
    <p>Wes</p>
    <p>Kait</p>
    <p>Snickers</p>
  </div>
<script>
  const people = document.querySelectorAll(".people p");
  
  // The Array.from() STATIC method can be used to convert "array-like" objects into actual arrays.
  
  // Static methods vs Prototype methods:
  // Static methods are methods that you call *on the class itself*. For Arrays, they help you create arrays out of non-arrays or check if something is an array (.isArray).
  // Prototype methods are methods that you call on an instance of an existing array, like .map() or .filter(), etc.
  
  
  // In this example, document.querySelectorAll returns a Node-list, which is similar to an array.
  // Using Array.from() and passing the node list as a parameter will return the node list contents as an array.
  // const names = Array.from(people).map(person => person.textContent)
  
  // Array.from() can accept the .map() function that I attached as a second argument because it's designed to accept a map function as its second argument.
  // Rewrite:
  // const names = Array.from(people, person => person.textContent)
  // This is more efficient because calling .map() chained off of .from essentially causes another array to be generated behind the scenes which is extra work/ less optimal for heavier loads.
  
  
  function sumAll() {
    return Array.from(arguments).reduce((acc, num) => acc + num, 0);
  }

console.log(sumAll(1,2,34,345,5,6))


// Array.of() Static Method:
// This just creates an array out of the arguments passed to it. 
const ages = Array.of(1,2,3,4,5)
console.log(ages);
</script>
</body>
</html>
