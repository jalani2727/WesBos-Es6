<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The ...Spread Operator</title>
  <style>
    body {
      min-height: 100vh;
      font-family: sans-serif;
      background: #ffc600;
      text-transform: uppercase;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      color:white;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .jump span {
      display: inline-block;
      transition: transform 0.2s;
      cursor:url('https://csscursor.info/santahand.fbeeee9f.png'), default;
    }
    .jump span:hover {
      transform: translateY(-20px) rotate(10deg) scale(2);
    }
  </style>
</head>
<body>
  <h2 class="jump">SPREADS!</h2>

<script>
  // Use map, spread and querySelector() to make the CSS work properly:
  
  // querySelector() to grab the h2 element
  const jumpElement = document.querySelector('.jump');

  // Spread to create an array of the letters

  // jumpElement.innerHTML = [...jumpElement.textContent].map(letter => `<span>${letter}</span>`
  // ).join('');
  
  // Rewrite as a functional programmer:
  jumpElement.innerHTML = spanify(jumpElement.textContent)
  function spanify(word) {
    return [...word].map(letter => `<span>${letter}</span>`
  ).join('');
  }
  
  
  // As a functional programmer, you should take note that this function is a pure function. It takes a string in and returns a string with no side effects. It is good practice to create these kinds of functions as constants with arrow notation, like so:
  // const spanify = word => [...word].map(letter => `<span>${letter}</span>`).join('')
  
  // Traditional function declarations are hoisted so they may be referenced before they are declared without issue. However, if you are going to declare a function as a constant, IT IS NOT HOISTED, and would need to be defined BEFORE it is called in the program. The const version of this function would need to be moved in the case of this example.

</script>
</body>
</html>
